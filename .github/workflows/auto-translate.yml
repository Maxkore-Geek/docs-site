name: Auto Translate with Crowdin

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'blog/**'
      - 'src/pages/**'
      - 'src/components/**'
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Generate translation files
        run: npm run write-translations -- --locale en
      
      - name: Install Crowdin CLI
        run: npm install @crowdin/cli@3
      
      - name: Upload sources to Crowdin
        run: npx crowdin upload sources
        env:
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
      
      - name: Download translations from Crowdin
        run: npx crowdin download
        env:
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
      
      - name: Commit translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add i18n/en/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update translations from Crowdin"
          git push
