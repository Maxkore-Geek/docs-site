name: Generate Translations

on:
  workflow_dispatch:  # 手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run write-translations -- --locale en  # 生成英文翻译模板
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: generate translation files"
          file_pattern: i18n/*
